<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ever Together</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body>
    <div class="background-container"></div>

    <header class="text-center py-12 md:py-20">
        <h1 class="text-4xl md:text-6xl font-bold tracking-tight">Ever Together</h1>
        <nav class="mt-8">
            <div class="inline-flex items-center bg-white/50 backdrop-blur-sm p-1 rounded-full shadow-md">
                <a href="index.html" class="px-6 py-2 text-sm font-semibold rounded-full bg-white text-gray-800 shadow-sm">Галерея</a>
                <a href="wishlist.html" class="px-6 py-2 text-sm font-semibold rounded-full text-gray-500 hover:text-gray-800 transition-colors">Вишлист</a>
                <a href="events.html" class="px-6 py-2 text-sm font-semibold rounded-full text-gray-500 hover:text-gray-800 transition-colors">События</a>
            </div>
        </nav>
    </header>

    <main id="gallery" class="container mx-auto px-4 sm:px-6 lg:px-8 pb-20">
        <!-- Photo cards will be injected here by JavaScript -->
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 flex items-center justify-center hidden z-50 transition-opacity duration-300">
        <div class="relative max-w-4xl max-h-[90vh] w-full h-full flex items-center justify-center">

            <!-- Filmstrip container -->
            <div class="w-full h-full overflow-hidden">
                <div id="lightbox-filmstrip" class="h-full">
                    <div class="lightbox-slide"><img id="prev-img"></div>
                    <div class="lightbox-slide"><img id="current-img"></div>
                    <div class="lightbox-slide"><img id="next-img"></div>
                </div>
            </div>

            <!-- Static Overlay for Text and Close Button -->
            <div class="absolute inset-0 w-full h-full">
                <div class="relative max-w-4xl max-h-[90vh] w-full h-full mx-auto">
                    <div class="absolute bottom-0 left-0 right-0 p-6 bg-black/30 backdrop-blur-lg rounded-b-2xl text-white">
                        <div class="flex justify-between items-start">
                            <div>
                                <p id="lightbox-date" class="font-semibold text-lg"></p>
                                <p id="lightbox-location" class="text-gray-300"></p>
                                <div id="comment-section" class="mt-2">
                                    <p id="lightbox-comment" class="text-gray-200 cursor-pointer"></p>
                                    <div id="edit-comment-container" class="hidden">
                                        <textarea id="edit-comment-textarea" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" rows="3"></textarea>
                                        <button id="save-comment-btn" class="mt-2 px-4 py-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg text-sm">Сохранить</button>
                                        <button id="cancel-comment-btn" class="mt-2 px-4 py-1 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg text-sm">Отмена</button>
                                    </div>
                                </div>
                            </div>
                            <button id="delete-photo-btn" class="text-gray-400 hover:text-white hover:bg-white/10 p-2 rounded-full transition-colors">
                                🗑️
                            </button>
                        </div>
                    </div>
                    <button id="lightbox-close" class="absolute top-0 right-0 sm:top-4 sm:-right-4 text-white text-3xl z-20">&times;</button>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Admin Panel -->
    <footer class="fixed bottom-0 left-0 right-0 p-4 flex justify-center">
        <button id="open-admin-btn" class="w-12 h-12 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center shadow-lg hover:bg-white transition-colors text-2xl">
            +
        </button>
    </footer>

    <div id="admin-panel" class="fixed inset-0 bg-black/30 backdrop-blur-xl flex items-center justify-center hidden z-40">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md mx-4 relative shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Добавить новое воспоминание</h2>
            <form id="upload-form">
                <div class="mb-4">
                    <label for="date" class="block text-sm font-medium text-gray-600 mb-1">Дата</label>
                    <input type="text" id="date" name="date" class="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="дд.мм.гггг" required>
                </div>
                <div class="mb-4">
                    <label for="location" class="block text-sm font-medium text-gray-600 mb-1">Место</label>
                    <input type="text" id="location" name="location" class="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Например, Париж, Франция" required>
                </div>
                <div class="mb-4">
                    <label for="comment" class="block text-sm font-medium text-gray-600 mb-1">Воспоминание</label>
                    <textarea id="comment" name="comment" rows="3" class="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Тот самый прекрасный вечер..."></textarea>
                </div>
                <div class="mb-6">
                    <label for="image-upload" class="block text-sm font-medium text-gray-600 mb-1">Фото</label>
                    <input type="file" id="image-upload" name="image" accept="image/*" class="w-full text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600" required>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center">
                    <span class="btn-text">Загрузить воспоминание</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>
            <button id="close-admin-btn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-3xl">&times;</button>
        </div>
    </div>

    <script defer src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script defer src="config.js"></script>
    <script defer src="firebase-init.js"></script>
    <script defer src="auth.js"></script>
    <script defer src="app.js"></script>
</body>
</html>
